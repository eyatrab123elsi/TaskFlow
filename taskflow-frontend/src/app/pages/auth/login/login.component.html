<div class="auth-layout">
  <div class="auth-left">
    <div class="auth-brand">
      <div class="brand-icon">
        <i class="bi bi-lightning-charge-fill"></i>
      </div>
      <h1>TaskFlow</h1>
      <p>Gérez vos projets et vos équipes avec efficacité.</p>
    </div>
    <div class="auth-illustration">
      <i class="bi bi-people-fill"></i>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Connexion</h2>
        <p>Accédez à votre espace de travail</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Adresse email</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput formControlName="email" type="email"
                 placeholder="nom@exemple.com" autocomplete="email">
          <mat-error *ngIf="email.hasError('required')">Email obligatoire</mat-error>
          <mat-error *ngIf="email.hasError('email')">Format invalide</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Mot de passe</mat-label>
          <mat-icon matPrefix>lock_outline</mat-icon>
          <input matInput formControlName="password"
                 [type]="hidePassword ? 'password' : 'text'"
                 autocomplete="current-password">
          <button mat-icon-button matSuffix type="button"
                  (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="password.hasError('required')">Mot de passe obligatoire</mat-error>
          <mat-error *ngIf="password.hasError('minlength')">Minimum 8 caractères</mat-error>
        </mat-form-field>

        <button mat-flat-button color="primary" type="submit"
                class="submit-btn w-100" [disabled]="loading">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <span *ngIf="!loading">Se connecter</span>
        </button>
      </form>

      <div class="auth-footer">
        <span>Pas encore de compte ?</span>
        <a routerLink="/auth/register">Créer un compte</a>
      </div>
    </div>
  </div>
</div>
